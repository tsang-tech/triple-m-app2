<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>20以內數學挑戰 - 💩 終極爆發版</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  body { 
    font-family: 'Courier New', Courier, monospace; 
    text-align: center; background-color: #fff9c4; 
    margin: 0; padding: 20px; touch-action: manipulation; overflow-x: hidden;
  }
  #app { 
    max-width: 400px; margin: 0 auto; background: white; 
    padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    min-height: 500px; position: relative;
  }
  .screen { display: none; }
  .active { display: block; }
  
  #feedback { 
    height: 30px; font-size: 1.2rem; font-weight: bold; margin: 5px 0;
    transition: all 0.2s; opacity: 0; font-family: sans-serif;
  }
  .show-feedback { opacity: 1 !important; transform: scale(1.1); }

  .stats { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: bold; font-family: sans-serif; }
  .combo-text { color: #ff5722; font-size: 1.1rem; font-weight: bold; margin: 5px 0; font-family: sans-serif;}
  
  /* 直式樣式 */
  .math-container { display: flex; justify-content: center; margin: 15px 0; }
  .vertical-math { font-size: 4.5rem; font-weight: bold; text-align: right; line-height: 1.1; display: inline-block; padding: 10px; }
  .bottom-line { border-bottom: 6px solid #333; display: block; margin-bottom: 10px; }
  .operator { float: left; margin-right: 20px; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .option-btn { 
    font-size: 2.5rem; padding: 20px; background-color: #fff; 
    border: 3px solid #e0e0e0; border-radius: 15px; cursor: pointer;
    box-shadow: 0 5px 0 #eee; transition: 0.1s;
  }
  .option-btn:active { transform: translateY(3px); box-shadow: none; }
  .option-btn:disabled { opacity: 0.5; }

  .btn-primary { 
    font-size: 1.2rem; padding: 15px; background-color: #4CAF50; 
    color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; font-family: sans-serif;
  }
  #leaderboard-list { list-style: none; padding: 0; text-align: left; font-family: sans-serif; max-height: 250px; overflow-y: auto; }
  #leaderboard-list li { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px dotted #ccc; align-items: center;}
  .record-tag { font-size: 0.8rem; background-color: #ff9800; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px;}

  #end-poo { font-size: 5rem; margin: 10px auto; display: none; }
</style>
</head>
<body>

<div id="app">
  <div id="start-screen" class="screen active">
    <h1 style="font-family:sans-serif;">💩 數學 Combo 噴發</h1>
    <p style="font-family:sans-serif;">大數永遠喺上面！<br>分數越高，爆出嘅 💩 越多！</p>
    <input type="text" id="player-name" placeholder="輸入名字" maxlength="10" style="font-size:1.5rem; padding:10px; width:80%; margin-bottom:10px; border-radius:8px; border:2px solid #ddd;">
    <button class="btn-primary" onclick="startGame()">開始 60秒 挑戰</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div style="color:#d32f2f">⏱ <span id="time">60</span>s</div>
      <div style="color:#1976d2">⭐ <span id="score">0</span></div>
    </div>
    <div id="combo-display" class="combo-text">Combo: 0</div>
    <div id="feedback"></div>
    
    <div class="math-container">
      <div class="vertical-math">
        <div id="num1">--</div>
        <div class="bottom-line">
          <span id="op-sign" class="operator">+</span>
          <span id="num2">--</span>
        </div>
      </div>
    </div>
    <div class="options-grid" id="options-container"></div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <div id="end-poo">💩</div>
    <h1 style="font-family:sans-serif; margin:5px 0;">🏆 龍虎榜</h1>
    <p id="end-msg" style="font-size:1.1rem; font-family:sans-serif; white-space: pre-wrap; margin:10px 0; color: #795548; font-weight: bold;"></p>
    <ul id="leaderboard-list"></ul>
    <button class="btn-primary" onclick="location.reload()">再玩一次</button>
  </div>
</div>

<script>
  let score = 0, timeLeft = 60, timerInterval, correctAnswer;
  let combo = 0, questionStartTime = 0, gameActive = false;
  let leaderboard = JSON.parse(localStorage.getItem("mathGameLeaderboard")) || [];
  
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startGame() {
    let name = document.getElementById("player-name").value.trim();
    if (!name) return alert("話我知你叫咩名先！");
    score = 0; timeLeft = 60; combo = 0; gameActive = true;
    updateStats();
    showScreen("game-screen");
    generateQuestion();
    
    // 核心計時器：更嚴謹的結束判斷
    timerInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        timeLeft = 0;
        document.getElementById("time").innerText = "0";
        stopGame(name);
      } else {
        document.getElementById("time").innerText = timeLeft;
      }
    }, 1000);
  }

  function stopGame(name) {
    gameActive = false;
    clearInterval(timerInterval);
    // 即刻鎖死按鈕防止再撳
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    
    // 延遲 300ms 進入結算，畀最後一題 Feedback 完
    setTimeout(() => endGame(name), 300);
  }

  function generateQuestion() {
    if (!gameActive) return;
    let isAdd = Math.random() > 0.5;
    let a = Math.floor(Math.random() * 21);
    let b = Math.floor(Math.random() * 21);
    
    // 永遠大數在上面
    let n1 = Math.max(a, b);
    let n2 = Math.min(a, b);
    
    if (isAdd) {
      correctAnswer = n1 + n2;
      document.getElementById("op-sign").innerText = "+";
    } else {
      correctAnswer = n1 - n2;
      document.getElementById("op-sign").innerText = "-";
    }

    document.getElementById("num1").innerText = n1.toString().padStart(2, ' ');
    document.getElementById("num2").innerText = n2.toString().padStart(2, ' ');
    
    questionStartTime = Date.now();
    displayOptions();
  }

  function displayOptions() {
    let opts = [correctAnswer];
    while (opts.length < 4) {
      let wrong = correctAnswer + (Math.floor(Math.random() * 9) - 4);
      if (wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
    }
    opts.sort(() => Math.random() - 0.5);

    const container = document.getElementById("options-container");
    container.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt;
      btn.onclick = () => checkAnswer(opt, btn);
      container.appendChild(btn);
    });
  }

  function checkAnswer(selected, btn) {
    if (!gameActive) return;
    const feedbackEl = document.getElementById("feedback");
    feedbackEl.classList.remove("show-feedback");
    
    if (selected === correctAnswer) {
      let timeUsed = (Date.now() - questionStartTime) / 1000;
      let basePoints = Math.max(1, 10 - Math.floor(timeUsed / 0.5));
      combo++;
      let multiplier = combo >= 3 ? 3 : (combo === 2 ? 2 : 1);
      let earned = basePoints * multiplier;
      score += earned;
      feedbackEl.innerText = `+${earned}分! (Combo x${multiplier})`;
      feedbackEl.style.color = "#4CAF50";
      btn.style.backgroundColor = "#c8e6c9";
    } else {
      combo = 0;
      score = Math.max(0, score - 5);
      feedbackEl.innerText = "答錯了! Combo 中斷";
      feedbackEl.style.color = "#f44336";
      btn.style.backgroundColor = "#ffcdd2";
    }
    
    updateStats();
    void feedbackEl.offsetWidth; 
    feedbackEl.classList.add("show-feedback");
    
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    setTimeout(() => {
      if(gameActive) {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = false);
        generateQuestion();
      }
    }, 350); 
  }

  function updateStats() {
    document.getElementById("score").innerText = score;
    document.getElementById("combo-display").innerText = `Combo: ${combo}`;
  }

  function endGame(name) {
    showScreen("leaderboard-screen");
    document.getElementById("end-poo").style.display = "block";
    
    let personalBest = 0;
    leaderboard.forEach(e => { if(e.name === name && e.score > personalBest) personalBest = e.score; });
    let isNewPB = score > personalBest;

    document.getElementById("end-msg").innerText = `最終分數：${score} \n💩 噴發強度：${score}!`;

    leaderboard.push({ name, score, isNewRecord: isNewPB });
    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 15);
    localStorage.setItem("mathGameLeaderboard", JSON.stringify(leaderboard));
    
    updateLeaderboardView(name, score);
    
    // 根據總分放 💩
    launchPooConfetti(score);
  }

  function launchPooConfetti(totalScore) {
    const pooEmoji = confetti.shapeFromText({ text: '💩', scalar: 2 });
    const duration = 5 * 1000;
    const end = Date.now() + duration;
    
    // 分數越高，粒數越多 (intensity)
    const intensity = 3 + Math.min(Math.floor(totalScore / 50), 30);

    (function frame() {
      confetti({
        particleCount: intensity,
        angle: 60, spread: 70, origin: { x: 0 },
        shapes: [pooEmoji], scalar: 0.6
      });
      confetti({
        particleCount: intensity,
        angle: 120, spread: 70, origin: { x: 1 },
        shapes: [pooEmoji], scalar: 0.6
      });
      if (Date.now() < end) requestAnimationFrame(frame);
    }());
  }

  function updateLeaderboardView(currentPlayerName, currentScore) {
    const list = document.getElementById("leaderboard-list");
    list.innerHTML = "";
    leaderboard.forEach((entry, index) => {
      const li = document.createElement("li");
      let medal = (index === 0) ? '🥇 ' : (index === 1 ? '🥈 ' : (index === 2 ? '🥉 ' : (index + 1) + '. '));
      let pbTag = (entry.isNewRecord && entry.name === currentPlayerName && entry.score === currentScore) ? '<span class="record-tag">NEW</span>' : '';
      li.innerHTML = `<span>${medal}${entry.name}${pbTag}</span><span style="color:#1976d2; font-weight:bold;">${entry.score} pts</span>`;
      list.appendChild(li);
    });
  }
</script>
</body>
</html>
