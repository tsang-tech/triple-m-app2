<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💩 Math Master - World Challenge 3.3</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  body { 
    font-family: 'Segoe UI', system-ui, sans-serif; 
    text-align: center; background-color: #fff9c4; 
    margin: 0; padding: 20px; touch-action: manipulation; overflow-x: hidden;
  }
  #app { 
    max-width: 400px; margin: 0 auto; background: white; 
    padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    min-height: 600px; position: relative;
  }
  .screen { display: none; }
  .active { display: block; }
  
  .controls-footer {
    position: absolute; bottom: 15px; right: 15px;
    display: flex; gap: 10px; z-index: 100;
  }
  .control-btn {
    font-size: 1.1rem; background: #f8f8f8; border: 2px solid #ddd;
    border-radius: 12px; width: 50px; height: 50px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-weight: bold;
    box-shadow: 0 2px 0 #ccc;
  }
  .control-btn:active { transform: translateY(2px); box-shadow: none; }

  .stats { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: bold; align-items: center; margin-top: 10px;}
  #time-container { color:#d32f2f; }
  .time-warning { transform: scale(1.3); color: #ff0000 !important; transition: 0.1s; font-weight: 900; }

  #feedback-msg { 
    height: 30px; font-weight: bold; margin: 5px 0; font-size: 1.1rem;
    transition: 0.2s; transform: scale(0);
  }
  .pop-feedback { transform: scale(1.2) !important; }
  #score-popup { color: #ff9800; font-size: 0.9rem; font-weight: bold; }

  .math-container { display: flex; justify-content: center; margin: 5px 0 15px; }
  .vertical-math { font-size: 4.5rem; font-weight: bold; text-align: right; line-height: 1.1; display: inline-block; padding: 10px; font-family: 'Courier New', monospace; }
  .bottom-line { border-bottom: 6px solid #333; display: block; margin-bottom: 10px; }
  .operator { float: left; margin-right: 20px; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-btn { 
    font-size: 2.2rem; padding: 15px; background-color: #fff; 
    border: 3px solid #e0e0e0; border-radius: 15px; cursor: pointer;
    box-shadow: 0 5px 0 #eee; transition: 0.1s; font-weight: bold;
  }
  .option-btn:active { transform: translateY(3px); box-shadow: none; }

  .btn-mode { font-size: 1rem; padding: 12px; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; box-shadow: 0 3px 0 rgba(0,0,0,0.1); transition: 0.1s;}
  .btn-mode:active { transform: translateY(2px); box-shadow: none; }
  .bg-practice { background-color: #4CAF50; }
  .bg-challenge { background-color: #9c27b0; font-size: 1.1rem; padding: 15px; margin-top: 8px;}
  .bg-view-lb { background-color: #607d8b; margin-top: 20px;}
  
  .mode-label { font-size: 0.8rem; color: #666; margin-top: 15px; margin-bottom: 8px; text-align: left; font-weight: bold; border-left: 4px solid #ffc107; padding-left: 8px;}
  
  .input-row { display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; }
  #player-country { font-size: 1.5rem; padding: 5px; border-radius: 8px; border: 2px solid #ddd; background: white; cursor: pointer; width: 35%; text-align: center;}
  #player-name { font-size: 1.2rem; padding: 10px; border-radius: 8px; border: 2px solid #ddd; width: 60%; box-sizing: border-box; }

  #leaderboard-list { list-style: none; padding: 0; text-align: left; max-height: 250px; overflow-y: auto; font-size: 0.9rem; margin-top: 10px;}
  #leaderboard-list li { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px dotted #ccc; align-items: center; }
</style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop preload="auto"></audio>
<audio id="audio-tick" src="tick.mp3" preload="auto"></audio>
<audio id="audio-win" src="win.mp3" preload="auto"></audio>

<div id="app">
  <div class="controls-footer">
    <button id="lang-btn" class="control-btn" onclick="toggleLang()">中</button>
    <button id="mute-btn" class="control-btn" onclick="toggleMute()">🎵</button>
  </div>

  <div id="start-screen" class="screen active">
    <h1 id="txt-title">💩 Math Mastery</h1>
    <p id="txt-subtitle">30 Seconds to burst the Poo!</p>
    
    <div class="input-row">
      <select id="player-country">
        <option value="🇭🇰" selected>🇭🇰 HK</option>
        <option value="🇲🇴">🇲🇴 MO</option>
        <option value="🇹🇼">🇹🇼 TW</option>
        <option value="🇨🇳">🇨🇳 CN</option>
        <option value="🇺🇸">🇺🇸 US</option>
        <option value="🇬🇧">🇬🇧 UK</option>
        <option value="🌍">🌍 Earth</option>
      </select>
      <input type="text" id="player-name" placeholder="Name / 名字" maxlength="10">
    </div>
    
    <div class="mode-label" id="txt-label-practice">PRACTICE AREA (30s)</div>
    <div class="options-grid">
        <button class="btn-mode bg-practice" onclick="prepareGame('add10')" id="txt-btn-add10">10或以內加法 ➕</button>
        <button class="btn-mode bg-practice" onclick="prepareGame('sub10')" id="txt-btn-sub10">10或以內減法 ➖</button>
        <button class="btn-mode bg-practice" onclick="prepareGame('add20')" id="txt-btn-add20">20或以內加法 ➕</button>
        <button class="btn-mode bg-practice" onclick="prepareGame('sub20')" id="txt-btn-sub20">20或以內減法 ➖</button>
    </div>
    
    <div class="mode-label" id="txt-label-challenge">CHALLENGE ZONE (30s)</div>
    <button class="btn-mode bg-challenge" onclick="prepareGame('mix')" id="txt-btn-mix">混合加減大挑戰 🔀</button>
    <button class="btn-mode bg-view-lb" onclick="openLeaderboardOnly()" id="txt-btn-viewlb">🏆 View Leaderboard</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div id="status-left"><span id="txt-quest">Quest</span>: <span id="quest-count">0</span></div>
      <div id="time-container">⏱ <span id="time">30</span>s</div>
      <div style="color:#1976d2">⭐ <span id="score">0</span></div>
    </div>
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <div id="feedback-msg">Ready?</div>
        <div id="score-popup"></div>
    </div>
    
    <div class="math-container">
      <div class="vertical-math">
        <div id="num1">--</div>
        <div class="bottom-line"><span id="op-sign" class="operator">+</span><span id="num2">--</span></div>
      </div>
    </div>
    <div class="options-grid" id="options-container"></div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <h1 id="txt-result-title">Time's Up!</h1>
    <p id="final-msg" style="font-weight:bold; color:#795548; white-space: pre-wrap; margin-bottom:15px; font-size:1.1rem;"></p>
    
    <div id="record-section">
        <div class="lb-tabs" style="display:flex; gap:5px; margin-bottom:10px;">
            <button class="lb-tab active" style="flex:1; padding:10px; border:none; border-radius:8px; background:#ff9800; color:white; font-weight:bold;" id="tab-world" onclick="switchTab('world')">World</button>
            <button class="lb-tab" style="flex:1; padding:10px; border:none; border-radius:8px; background:#eee;" id="tab-personal" onclick="switchTab('personal')">Personal</button>
        </div>
        <ul id="leaderboard-list"></ul>
    </div>
    <button class="btn-mode" style="background:#444; margin-top:15px; padding:15px;" onclick="location.reload()" id="txt-btn-home">Back to Home</button>
  </div>
</div>

<script>
  let score = 0, timeLeft = 30, timerInterval, correctAnswer, gameMode = 'mix';
  let combo = 0, questCount = 0, gameActive = false, isMuted = false, currentLang = 'zh'; 
  let questionStartTime = 0;
  let currentActiveTab = 'world';

  // 1. 記憶名字功能
  window.onload = () => {
    const savedName = localStorage.getItem("mathPoo_lastPlayerName");
    if (savedName) document.getElementById("player-name").value = savedName;
    updateStaticText();
  };

  let leaderboard = JSON.parse(localStorage.getItem("mathPooLeaderboardV3")) || [];
  const audioBgm = document.getElementById("audio-bgm");
  const audioTick = document.getElementById("audio-tick");
  const audioWin = document.getElementById("audio-win");

  const i18n = {
    en: {
        title: "💩 Math Mastery", subtitle: "30 Seconds Challenge!",
        practice: "PRACTICE AREA", challenge: "CHALLENGE ZONE",
        add10: "Add (10 or below) ➕", sub10: "Sub (10 or below) ➖",
        add20: "Add (20 or below) ➕", sub20: "Sub (20 or below) ➖", 
        mix: "Mixed Challenge (20 or below) 🔀", viewlb: "🏆 Leaderboard",
        quest: "Quest", resultEnd: "Time's Up!", home: "Back to Home",
        pos: ["Excellent!", "Fast!", "Perfect!", "Well Done!"],
        neg: ["Don't give up!", "Try again!", "Almost!"]
    },
    zh: {
        title: "💩 算術大師", subtitle: "30 秒衝刺，迎接 💩 大爆發！",
        practice: "練習區 (30秒限時)", challenge: "挑戰區 (30秒限時)",
        add10: "10或以內加法 ➕", sub10: "10或以內減法 ➖",
        add20: "20或以內加法 ➕", sub20: "20或以內減法 ➖", 
        mix: "混合加減大挑戰 🔀", viewlb: "🏆 查看龍虎榜",
        quest: "題數", resultEnd: "時間到！", home: "返回主頁",
        pos: ["神速！", "太厲害了！", "完美！", "做得好！"],
        neg: ["加油！", "再試一次！", "差一點點！"]
    }
  };

  function toggleLang() {
    currentLang = currentLang === 'en' ? 'zh' : 'en';
    document.getElementById("lang-btn").innerText = currentLang === 'en' ? '中' : 'EN';
    updateStaticText();
  }

  function updateStaticText() {
    const t = i18n[currentLang];
    document.getElementById("txt-title").innerText = t.title;
    document.getElementById("txt-subtitle").innerText = t.subtitle;
    document.getElementById("txt-label-practice").innerText = t.practice;
    document.getElementById("txt-label-challenge").innerText = t.challenge;
    document.getElementById("txt-btn-add10").innerText = t.add10;
    document.getElementById("txt-btn-sub10").innerText = t.sub10;
    document.getElementById("txt-btn-add20").innerText = t.add20;
    document.getElementById("txt-btn-sub20").innerText = t.sub20;
    document.getElementById("txt-btn-mix").innerText = t.mix;
    document.getElementById("txt-btn-viewlb").innerText = t.viewlb;
    document.getElementById("txt-quest").innerText = t.quest;
    document.getElementById("txt-btn-home").innerText = t.home;
  }

  function toggleMute() {
    isMuted = !isMuted;
    document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🎵";
    [audioBgm, audioTick, audioWin].forEach(a => a.muted = isMuted);
  }

  function prepareGame(mode) {
    gameMode = mode;
    let name = document.getElementById("player-name").value.trim() || (currentLang === 'en' ? "Player" : "無名大師");
    let flag = document.getElementById("player-country").value.substring(0,2);
    localStorage.setItem("mathPoo_lastPlayerName", name);

    [audioBgm, audioTick, audioWin].forEach(a => { a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(e=>e); });
    startGame(name, flag);
  }

  function startGame(name, flag) {
    score = 0; combo = 0; questCount = 0; timeLeft = 30; gameActive = true;
    document.getElementById("score").innerText = "0";
    document.getElementById("quest-count").innerText = "0";
    document.getElementById("time").innerText = "30";
    document.getElementById("score-popup").innerText = "";
    showScreen("game-screen");
    if(!isMuted) audioBgm.play().catch(e=>e);
    
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("time").innerText = timeLeft;
      if (timeLeft <= 5 && timeLeft > 0) document.getElementById("time-container").classList.add("time-warning");
      if (timeLeft <= 0) { clearInterval(timerInterval); endGame(name, flag); }
    }, 1000);
    generateQuestion();
  }

  function generateQuestion() {
    // 2. 核心邏輯：10 或 20 以內
    let limit = (gameMode.includes('10')) ? 10 : 20;
    let op = gameMode.startsWith('sub') ? 'sub' : (gameMode === 'mix' ? (Math.random() > 0.5 ? 'add' : 'sub') : 'add');

    let n1, n2;
    if (op === 'add') {
        n1 = Math.floor(Math.random() * (limit + 1));
        n2 = Math.floor(Math.random() * (limit + 1));
        correctAnswer = n1 + n2;
        document.getElementById("op-sign").innerText = "+";
    } else {
        n1 = Math.floor(Math.random() * (limit + 1));
        n2 = Math.floor(Math.random() * (n1 + 1)); 
        correctAnswer = n1 - n2;
        document.getElementById("op-sign").innerText = "-";
    }
    
    document.getElementById("num1").innerText = n1.toString().padStart(2, ' ');
    document.getElementById("num2").innerText = n2.toString().padStart(2, ' ');
    questionStartTime = Date.now();
    
    let opts = [correctAnswer];
    while (opts.length < 4) {
      let wrong = correctAnswer + (Math.floor(Math.random() * 9) - 4);
      if (wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
    }
    opts.sort(() => Math.random() - 0.5);
    
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt;
      btn.onclick = () => handleAnswer(opt, btn);
      container.appendChild(btn);
    });
  }

  function handleAnswer(selected, btn) {
    if(!gameActive) return;
    const fb = document.getElementById("feedback-msg");
    const sp = document.getElementById("score-popup");
    const t = i18n[currentLang];
    fb.classList.remove("pop-feedback");
    
    if (selected === correctAnswer) {
      // 3. 恢復 3.0 版本計分方式
      let timeUsed = (Date.now() - questionStartTime) / 1000;
      let basePts = Math.max(1, 10 - Math.floor(timeUsed / 0.5));
      questCount++; combo++;
      let earned = basePts * combo;
      score += earned;
      
      // 4. 恢復鼓勵語言
      fb.innerText = t.pos[Math.floor(Math.random() * t.pos.length)];
      fb.style.color = "#4CAF50";
      sp.innerText = `+${earned} (x${combo})`;
      btn.style.backgroundColor = "#c8e6c9";
    } else {
      combo = 0;
      fb.innerText = t.neg[Math.floor(Math.random() * t.neg.length)];
      fb.style.color = "#f44336";
      sp.innerText = "Combo Broken!";
      btn.style.backgroundColor = "#ffcdd2";
    }
    
    document.getElementById("score").innerText = score;
    document.getElementById("quest-count").innerText = questCount;
    void fb.offsetWidth; fb.classList.add("pop-feedback");
    setTimeout(generateQuestion, 150);
  }

  function endGame(name, flag) {
    gameActive = false; audioBgm.pause();
    if(!isMuted) audioWin.play().catch(e=>e);
    showScreen("leaderboard-screen");
    
    const t = i18n[currentLang];
    document.getElementById("txt-result-title").innerText = t.resultEnd;
    document.getElementById("final-msg").innerText = `${flag} ${name}\nScore: ${score}\nQuests: ${questCount}`;
    
    if (gameMode === 'mix') {
        leaderboard.push({ name, flag, score, date: new Date().toLocaleDateString() });
        localStorage.setItem("mathPooLeaderboardV3", JSON.stringify(leaderboard));
        renderLeaderboard();
        
        const poo = confetti.shapeFromText({ text: '💩' });
        for(let i=0; i<12; i++) {
            setTimeout(() => {
                confetti({ particleCount: 35, spread: 120, origin: { y: 0.6 }, shapes: [poo], scalar: 2 });
            }, i * 200);
        }
    }
  }

  function renderLeaderboard() {
      const list = document.getElementById("leaderboard-list");
      list.innerHTML = "";
      let lastPlayer = localStorage.getItem("mathPoo_lastPlayerName");
      let data = (currentActiveTab === 'personal') ? 
                 leaderboard.filter(e => e.name === lastPlayer) : leaderboard;
      
      data.sort((a, b) => b.score - a.score).slice(0, 25).forEach((e, i) => {
          let medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}.`;
          list.innerHTML += `<li><span>${medal} ${e.flag} ${e.name}</span><b>${e.score}</b></li>`;
      });
  }

  function switchTab(tab) {
      currentActiveTab = tab;
      document.querySelectorAll('.lb-tab').forEach(b => { b.style.background = "#eee"; b.style.color = "#000"; });
      document.getElementById(`tab-${tab}`).style.background = "#ff9800";
      document.getElementById(`tab-${tab}`).style.color = "white";
      renderLeaderboard();
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function openLeaderboardOnly() { showScreen("leaderboard-screen"); switchTab('world'); }
</script>
</body>
</html>
