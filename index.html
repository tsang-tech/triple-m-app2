<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💩 算術練習與挑戰版</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    text-align: center; background-color: #fff9c4; 
    margin: 0; padding: 20px; touch-action: manipulation; overflow-x: hidden;
  }
  #app { 
    max-width: 400px; margin: 0 auto; background: white; 
    padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    min-height: 580px; position: relative;
  }
  .screen { display: none; }
  .active { display: block; }
  
  #mute-btn {
    position: absolute; top: 15px; right: 15px;
    font-size: 1.5rem; background: #eee; border: none;
    border-radius: 50%; width: 45px; height: 45px; cursor: pointer; z-index: 100;
  }

  .stats { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; align-items: center; margin-top: 10px;}
  #time-container { color:#d32f2f; }
  .time-warning { transform: scale(1.3); color: #ff0000 !important; transition: 0.1s; }

  #feedback-msg { 
    height: 30px; font-weight: bold; margin: 10px 0; font-size: 1.2rem;
    transition: 0.2s; transform: scale(0);
  }
  .pop-feedback { transform: scale(1.2) !important; }

  .math-container { display: flex; justify-content: center; margin: 10px 0; }
  .vertical-math { font-size: 4.5rem; font-weight: bold; text-align: right; line-height: 1.1; display: inline-block; padding: 10px; font-family: 'Courier New', monospace; }
  .bottom-line { border-bottom: 6px solid #333; display: block; margin-bottom: 10px; }
  .operator { float: left; margin-right: 20px; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .option-btn { 
    font-size: 2.5rem; padding: 15px; background-color: #fff; 
    border: 3px solid #e0e0e0; border-radius: 15px; cursor: pointer;
    box-shadow: 0 5px 0 #eee; transition: 0.1s;
  }
  .option-btn:active { transform: translateY(3px); box-shadow: none; }

  .btn-mode { font-size: 1.1rem; padding: 12px; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 8px; font-weight: bold; }
  .bg-practice { background-color: #4CAF50; }
  .bg-challenge { background-color: #9c27b0; }
  
  .mode-label { font-size: 0.8rem; color: #666; margin-top: 15px; text-align: left; font-weight: bold; border-left: 4px solid #ffc107; padding-left: 8px;}
  
  #leaderboard-list { list-style: none; padding: 0; text-align: left; max-height: 150px; overflow-y: auto; font-size: 0.85rem; }
  #leaderboard-list li { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px dotted #ccc; }
</style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop preload="auto"></audio>
<audio id="audio-tick" src="tick.mp3" preload="auto"></audio>
<audio id="audio-win" src="win.mp3" preload="auto"></audio>

<div id="app">
  <button id="mute-btn" onclick="toggleMute()">🎵</button>

  <div id="start-screen" class="screen active">
    <h1 style="margin-bottom:5px;">💩 Math Mastery</h1>
    <p style="color:#795548; font-size:0.9rem;">練好加減法，挑戰 💩 爆發！</p>
    
    <input type="text" id="player-name" placeholder="Enter Your Name" maxlength="10" style="font-size:1.3rem; padding:10px; width:80%; margin-bottom:10px; border-radius:8px; border:2px solid #ddd;">
    
    <div class="mode-label">PRACTICE AREA (練習區)</div>
    <button class="btn-mode bg-practice" onclick="prepareGame('add')">Pure Addition ➕</button>
    <button class="btn-mode bg-practice" onclick="prepareGame('sub')">Pure Subtraction ➖</button>
    
    <div class="mode-label">CHALLENGE ZONE (挑戰區)</div>
    <button class="btn-mode bg-challenge" onclick="prepareGame('mix')">Mixed & 💩 Effects 🔀</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div id="status-left">Quest: <span id="quest-count">0</span></div>
      <div id="time-container">⏱ <span id="time">--</span>s</div>
      <div style="color:#1976d2">⭐ <span id="score">0</span></div>
    </div>
    <div id="feedback-msg">Good Luck!</div>
    
    <div class="math-container">
      <div class="vertical-math">
        <div id="num1">--</div>
        <div class="bottom-line"><span id="op-sign" class="operator">+</span><span id="num2">--</span></div>
      </div>
    </div>
    <div class="options-grid" id="options-container"></div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <h1 id="result-title" style="margin:10px 0;">Well Done!</h1>
    <p id="final-msg" style="font-weight:bold; color:#795548; white-space: pre-wrap; margin-bottom:15px;"></p>
    <div id="record-section">
        <p style="font-size:0.8rem; font-weight:bold; text-align:left;">Top 10 Records:</p>
        <ul id="leaderboard-list"></ul>
    </div>
    <button class="btn-mode" style="background:#444;" onclick="location.reload()">Back to Home</button>
  </div>
</div>

<script>
  let score = 0, timeLeft = 30, timerInterval, correctAnswer, gameMode = 'mix';
  let combo = 0, questCount = 0, gameActive = false, isMuted = false;
  let leaderboard = JSON.parse(localStorage.getItem("mathPooLeaderboard")) || [];

  const audioBgm = document.getElementById("audio-bgm");
  const audioTick = document.getElementById("audio-tick");
  const audioWin = document.getElementById("audio-win");

  const positiveFeedback = ["Excellent!", "Amazing!", "Perfect!", "Well Done!", "Great!", "Superb!"];
  const encourageFeedback = ["Don't give up!", "Try again!", "You can do it!", "Keep going!", "Almost there!"];

  function toggleMute() {
    isMuted = !isMuted;
    document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🎵";
    [audioBgm, audioTick, audioWin].forEach(a => a.muted = isMuted);
  }

  function prepareGame(mode) {
    gameMode = mode;
    let name = document.getElementById("player-name").value.trim() || "Player";
    
    // 點擊即授權所有音效播放權
    [audioBgm, audioTick, audioWin].forEach(a => {
        a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(e=>e);
    });

    setTimeout(() => startGame(name), 150);
  }

  function startGame(name) {
    score = 0; combo = 0; questCount = 0; gameActive = true;
    document.getElementById("score").innerText = "0";
    document.getElementById("quest-count").innerText = "0";
    showScreen("game-screen");

    if (gameMode === 'mix') {
      timeLeft = 30;
      document.getElementById("time").innerText = timeLeft;
      if(!isMuted) audioBgm.play().catch(e=>e);
      
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;
        if (timeLeft <= 5 && timeLeft > 0) {
            document.getElementById("time-container").classList.add("time-warning");
            if(!isMuted) { audioTick.currentTime = 0; audioTick.play().catch(e=>e); }
            setTimeout(()=>document.getElementById("time-container").classList.remove("time-warning"), 200);
        }
        if (timeLeft <= 0) { clearInterval(timerInterval); endGame(name); }
      }, 1000);
    } else {
      document.getElementById("time").innerText = "∞"; // 練習模式不限時
    }
    
    generateQuestion();
  }

  function generateQuestion() {
    let currentOp = gameMode === 'mix' ? (Math.random() > 0.5 ? 'add' : 'sub') : gameMode;
    let a = Math.floor(Math.random() * 21), b = Math.floor(Math.random() * 21);
    let n1 = Math.max(a, b), n2 = Math.min(a, b);
    
    if (currentOp === 'add') { correctAnswer = n1 + n2; document.getElementById("op-sign").innerText = "+"; }
    else { correctAnswer = n1 - n2; document.getElementById("op-sign").innerText = "-"; }
    
    document.getElementById("num1").innerText = n1.toString().padStart(2, ' ');
    document.getElementById("num2").innerText = n2.toString().padStart(2, ' ');
    
    let opts = [correctAnswer];
    while (opts.length < 4) {
      let wrong = correctAnswer + (Math.floor(Math.random() * 11) - 5);
      if (wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
    }
    opts.sort(() => Math.random() - 0.5);
    
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt;
      btn.onclick = () => handleAnswer(opt, btn, name);
      container.appendChild(btn);
    });
  }

  function handleAnswer(selected, btn, name) {
    if(!gameActive) return;
    const fb = document.getElementById("feedback-msg");
    fb.classList.remove("pop-feedback");
    
    if (selected === correctAnswer) {
      questCount++;
      combo++;
      score += (gameMode === 'mix' ? combo * 10 : 10); // 挑戰模式有Combo加成
      fb.innerText = positiveFeedback[Math.floor(Math.random() * positiveFeedback.length)];
      fb.style.color = "#4CAF50";
      btn.style.backgroundColor = "#c8e6c9";
    } else {
      combo = 0;
      fb.innerText = encourageFeedback[Math.floor(Math.random() * encourageFeedback.length)];
      fb.style.color = "#f44336";
      btn.style.backgroundColor = "#ffcdd2";
    }
    
    document.getElementById("score").innerText = score;
    document.getElementById("quest-count").innerText = questCount;
    void fb.offsetWidth; 
    fb.classList.add("pop-feedback");

    // 如果練習模式達到一定題數（例如20題）可以自動完結，或者讓玩家手動按返回
    if (gameMode !== 'mix' && questCount >= 20) {
        endGame(document.getElementById("player-name").value || "Player");
    } else {
        setTimeout(generateQuestion, 200);
    }
  }

  function endGame(name) {
    gameActive = false;
    clearInterval(timerInterval);
    audioBgm.pause();
    if(!isMuted) audioWin.play().catch(e=>e);
    
    showScreen("leaderboard-screen");
    const modeText = {add:'Addition Practice', sub:'Subtraction Practice', mix:'Mixed Challenge'}[gameMode];
    document.getElementById("final-msg").innerText = `${name}\nMode: ${modeText}\nQuestions Solved: ${questCount}\nTotal Score: ${score}`;

    if (gameMode === 'mix') {
      leaderboard.push({ name, score, date: new Date().toLocaleDateString() });
      leaderboard.sort((a, b) => b.score - a.score);
      localStorage.setItem("mathPooLeaderboard", JSON.stringify(leaderboard.slice(0, 10)));
      updateLeaderboard();
      
      // 只有挑戰模式有爆發特效
      const poo = confetti.shapeFromText({ text: '💩', scalar: 2.5 });
      let bursts = 0;
      const interval = setInterval(() => {
          confetti({
              particleCount: Math.min(Math.ceil(score / 5), 100),
              spread: 120,
              origin: { y: 0.6, x: Math.random() },
              shapes: [poo],
              scalar: 2.5
          });
          bursts++;
          if(bursts >= 10) clearInterval(interval);
      }, 350);
    } else {
        document.getElementById("record-section").style.display = "none";
        document.getElementById("result-title").innerText = "Practice Complete!";
    }
  }

  function updateLeaderboard() {
    const list = document.getElementById("leaderboard-list");
    list.innerHTML = "";
    leaderboard.forEach((e, i) => {
        list.innerHTML += `<li><span>${i+1}. ${e.name}</span><b>${e.score} pts</b></li>`;
    });
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>
</body>
</html>
