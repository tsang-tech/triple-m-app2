<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加減混合大激鬥 - 💩 Math Master 3.7</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; text-align: center; background-color: #fff9c4; margin: 0; padding: 20px; touch-action: manipulation; }
  #app { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 600px; position: relative; }
  .screen { display: none; }
  .active { display: block; }
  
  .controls-footer { position: absolute; bottom: 15px; right: 15px; display: flex; gap: 10px; z-index: 100; }
  .control-btn { font-size: 1.1rem; background: #f8f8f8; border: 2px solid #ddd; border-radius: 12px; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

  .stats { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: bold; align-items: center; margin-top: 10px;}
  #time-container { color:#d32f2f; }
  .time-warning { transform: scale(1.3); color: #ff0000 !important; font-weight: 900; }

  #feedback-msg { height: 30px; font-weight: bold; margin: 5px 0; font-size: 1.1rem; transition: 0.2s; transform: scale(0); }
  .pop-feedback { transform: scale(1.2) !important; }
  #score-popup { font-size: 0.9rem; font-weight: bold; }

  .math-container { display: flex; justify-content: center; margin: 5px 0 15px; }
  .vertical-math { font-size: 4.5rem; font-weight: bold; text-align: right; line-height: 1.1; font-family: 'Courier New', monospace; }
  .bottom-line { border-bottom: 6px solid #333; display: block; margin-bottom: 10px; }
  .operator { float: left; margin-right: 20px; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-btn { font-size: 2.2rem; padding: 15px; background-color: #fff; border: 3px solid #e0e0e0; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #eee; font-weight: bold; }
  .option-btn:active { transform: translateY(3px); box-shadow: none; }

  .btn-mode { font-size: 1rem; padding: 12px; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 5px;}
  .bg-practice { background-color: #4CAF50; }
  .bg-challenge { background-color: #9c27b0; font-size: 1.1rem; padding: 15px; }
  .bg-view-lb { background-color: #607d8b; }
  
  .mode-label { font-size: 0.8rem; color: #666; margin-top: 15px; text-align: left; font-weight: bold; border-left: 4px solid #ffc107; padding-left: 8px;}
  
  .input-row { display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; }
  #player-country { font-size: 1.1rem; padding: 5px; border-radius: 8px; border: 2px solid #ddd; width: 40%; }
  #player-name { font-size: 1.2rem; padding: 10px; border-radius: 8px; border: 2px solid #ddd; width: 55%; }

  .lb-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
  .lb-tab { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #eee; cursor: pointer; font-weight: bold; }
  .lb-tab.active { background: #ff9800; color: white; }

  #leaderboard-list, #mistakes-list { list-style: none; padding: 0; text-align: left; max-height: 200px; overflow-y: auto; font-size: 0.9rem; margin-top: 10px; border: 1px solid #eee; border-radius: 8px;}
  #leaderboard-list li, #mistakes-list li { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
  .mistake-item { color: #d32f2f; }
  .correct-part { color: #388e3c; font-weight: bold; }
</style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop></audio>
<audio id="audio-tick" src="tick.mp3"></audio>
<audio id="audio-win" src="win.mp3"></audio>

<div id="app">
  <div class="controls-footer">
    <button id="lang-btn" class="control-btn" onclick="toggleLang()">中</button>
    <button id="mute-btn" class="control-btn" onclick="toggleMute()">🎵</button>
  </div>

  <div id="start-screen" class="screen active">
    <h1 id="txt-title" style="margin-bottom:10px;">加減混合大激鬥 💩</h1>
    <p id="txt-subtitle" style="font-weight:bold; color:#795548; line-height:1.4;">30秒鬥快鬥準，爆出最多最多嘅可愛poo poo</p>
    
    <div class="input-row">
      <select id="player-country">
        <optgroup label="亞洲與地區">
            <option value="🇭🇰" selected>🇭🇰 香港 HK</option>
            <option value="🇲🇴">🇲🇴 澳門 MO</option>
            <option value="🇹🇼">🇹🇼 台灣 TW</option>
            <option value="🇨🇳">🇨🇳 中國 CN</option>
            <option value="🇯🇵">🇯🇵 日本 JP</option>
            <option value="🇰🇷">🇰🇷 韓國 KR</option>
            <option value="🇸🇬">🇸🇬 新加坡 SG</option>
            <option value="🇲🇾">🇲🇾 馬來西亞 MY</option>
            <option value="🇹🇭">🇹🇭 泰國 TH</option>
            <option value="🇻🇳">🇻🇳 越南 VN</option>
        </optgroup>
        <optgroup label="歐美與其他">
            <option value="🇬🇧">🇬🇧 英國 UK</option>
            <option value="🇺🇸">🇺🇸 美國 US</option>
            <option value="🇨🇦">🇨🇦 加拿大 CA</option>
            <option value="🇦🇺">🇦🇺 澳洲 AU</option>
            <option value="🇫🇷">🇫🇷 法國 FR</option>
            <option value="🇩🇪">🇩🇪 德國 DE</option>
            <option value="🇮🇹">🇮🇹 意大利 IT</option>
            <option value="🇪🇸">🇪🇸 西班牙 ES</option>
        </optgroup>
        <optgroup label="趣味選擇">
            <option value="🌍">🌍 地球人 Earth</option>
            <option value="🇺🇳">🇺🇳 聯合國 UN</option>
            <option value="🏴‍☠️">🏴‍☠️ 海盜 Pirate</option>
            <option value="🏁">🏁 賽車手 Racing</option>
        </optgroup>
      </select>
      <input type="text" id="player-name" placeholder="Name / 名字" maxlength="10">
    </div>
    
    <div class="mode-label" id="txt-label-practice">練習區</div>
    <div class="options-grid">
        <button class="btn-mode bg-practice" onclick="prepareGame('add10')" id="txt-btn-add10">10或以內加法 ➕</button>
        <button class="btn-mode bg-practice" onclick="prepareGame('sub10')" id="txt-btn-sub10">10或以內減法 ➖</button>
        <button class="btn-mode bg-practice" onclick="prepareGame('add20')" id="txt-btn-add20">20或以內加法 ➕</button>
        <button class="btn-mode bg-practice" onclick="prepareGame('sub20')" id="txt-btn-sub20">20或以內減法 ➖</button>
    </div>
    
    <div class="mode-label" id="txt-label-challenge">挑戰區</div>
    <button class="btn-mode bg-challenge" onclick="prepareGame('mix')" id="txt-btn-mix">混合加減大挑戰 🔀</button>
    <button class="btn-mode bg-view-lb" onclick="openLeaderboardOnly()" id="txt-btn-viewlb">🏆 查看龍虎榜</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div><span class="l-quest">題數</span>: <span id="quest-count">0</span></div>
      <div id="time-container">⏱ <span id="time">30</span>s</div>
      <div style="color:#795548">💩 <span id="score">0</span></div>
    </div>
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <div id="feedback-msg">Ready?</div>
        <div id="score-popup"></div>
    </div>
    <div class="math-container">
      <div class="vertical-math">
        <div id="num1">--</div>
        <div class="bottom-line"><span id="op-sign" class="operator">+</span><span id="num2">--</span></div>
      </div>
    </div>
    <div class="options-grid" id="options-container"></div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <div id="result-header">
        <div style="font-size: 4rem;">💩</div>
        <h2 id="txt-result-title" style="margin:0; color:#9c27b0;">加減混合大激鬥</h2>
    </div>
    <p id="final-stats" style="font-weight:bold; background:#f0f0f0; padding:10px; border-radius:10px; margin:10px 0;"></p>
    <div id="mistakes-section" style="display:none; text-align:left;">
        <b id="txt-wrong-title">⚠️ 錯題檢討：</b>
        <ul id="mistakes-list"></ul>
    </div>
    <div id="record-section" style="margin-top:15px;">
        <div class="lb-tabs">
            <button class="lb-tab active" id="tab-world" onclick="switchTab('world')">World</button>
            <button class="lb-tab" id="tab-regional" onclick="switchTab('regional')">Region</button>
            <button class="lb-tab" id="tab-personal" onclick="switchTab('personal')">Personal</button>
        </div>
        <ul id="leaderboard-list"></ul>
    </div>
    <button class="btn-mode" style="background:#444; margin-top:10px; padding:15px;" onclick="location.reload()" id="txt-btn-home">返回主頁</button>
  </div>
</div>

<script>
  let score = 0, timeLeft = 30, timerInterval, correctAnswer, gameMode = 'mix';
  let combo = 0, questCount = 0, gameActive = false, isMuted = false, currentLang = 'zh'; 
  let questionStartTime = 0, wrongQuestions = [];
  let currentActiveTab = 'world';

  window.onload = () => {
    const savedName = localStorage.getItem("mathPoo_Name");
    if (savedName) document.getElementById("player-name").value = savedName;
    updateStaticText();
  };

  const i18n = {
    en: {
        title: "Mixed Math Battle! 💩", subtitle: "30s speed & accuracy challenge to pop cute poos!",
        practice: "PRACTICE AREA", challenge: "CHALLENGE ZONE",
        add10: "Add (within 10) ➕", sub10: "Sub (within 10) ➖",
        add20: "Add (within 20) ➕", sub20: "Sub (within 20) ➖", 
        mix: "Mixed Battle 🔀", viewlb: "🏆 Leaderboard",
        quest: "Quest", resultTitle: "Mixed Math Battle!", home: "Back to Home",
        scoreLabel: "Total Score", questLabel: "Correct", wrongTitle: "⚠️ Review Mistakes:",
        pos: ["Fast!", "Perfect!", "Well Done!"], neg: ["Try again!", "Almost!"]
    },
    zh: {
        title: "加減混合大激鬥 💩", subtitle: "30秒鬥快鬥準，爆出最多最多嘅可愛poo poo",
        practice: "練習區", challenge: "挑戰區",
        add10: "10或以內加法 ➕", sub10: "10或以內減法 ➖",
        add20: "20或以內加法 ➕", sub20: "20或以內減法 ➖", 
        mix: "混合加減大激鬥 🔀", viewlb: "🏆 查看龍虎榜",
        quest: "題數", resultTitle: "加減混合大激鬥", home: "返回主頁",
        scoreLabel: "總得分", questLabel: "答對題數", wrongTitle: "⚠️ 錯題檢討：",
        pos: ["神速！", "完美！", "做得好！"], neg: ["加油！", "再試一次！"]
    }
  };

  function toggleLang() {
    currentLang = currentLang === 'en' ? 'zh' : 'en';
    document.getElementById("lang-btn").innerText = currentLang === 'en' ? '中' : 'EN';
    updateStaticText();
  }

  function updateStaticText() {
    const t = i18n[currentLang];
    document.getElementById("txt-title").innerText = t.title;
    document.getElementById("txt-subtitle").innerText = t.subtitle;
    document.querySelectorAll(".l-quest").forEach(el => el.innerText = t.quest);
    document.getElementById("txt-label-practice").innerText = t.practice;
    document.getElementById("txt-label-challenge").innerText = t.challenge;
    document.getElementById("txt-btn-add10").innerText = t.add10;
    document.getElementById("txt-btn-sub10").innerText = t.sub10;
    document.getElementById("txt-btn-add20").innerText = t.add20;
    document.getElementById("txt-btn-sub20").innerText = t.sub20;
    document.getElementById("txt-btn-mix").innerText = t.mix;
    document.getElementById("txt-btn-viewlb").innerText = t.viewlb;
    document.getElementById("txt-btn-home").innerText = t.home;
    document.getElementById("txt-wrong-title").innerText = t.wrongTitle;
  }

  function prepareGame(mode) {
    gameMode = mode;
    let name = document.getElementById("player-name").value.trim() || "Player";
    localStorage.setItem("mathPoo_Name", name);
    startGame(name);
  }

  function startGame(name) {
    score = 0; combo = 0; questCount = 0; timeLeft = 30; wrongQuestions = []; gameActive = true;
    document.getElementById("score").innerText = "0";
    showScreen("game-screen");
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("time").innerText = timeLeft;
      if (timeLeft <= 5) document.getElementById("time-container").classList.add("time-warning");
      if (timeLeft <= 0) { clearInterval(timerInterval); endGame(name); }
    }, 1000);
    generateQuestion();
  }

  function generateQuestion() {
    let limit = (gameMode.includes('10')) ? 10 : 20;
    let op = gameMode.startsWith('sub') ? 'sub' : (gameMode === 'mix' ? (Math.random() > 0.5 ? 'add' : 'sub') : 'add');
    let n1, n2;
    if (op === 'add') {
        n1 = Math.floor(Math.random() * (limit + 1)); n2 = Math.floor(Math.random() * (limit + 1));
        correctAnswer = n1 + n2; document.getElementById("op-sign").innerText = "+";
    } else {
        n1 = Math.floor(Math.random() * (limit + 1)); n2 = Math.floor(Math.random() * (n1 + 1));
        correctAnswer = n1 - n2; document.getElementById("op-sign").innerText = "-";
    }
    document.getElementById("num1").innerText = n1; document.getElementById("num2").innerText = n2;
    questionStartTime = Date.now();
    let opts = [correctAnswer];
    while (opts.length < 4) {
      let w = correctAnswer + (Math.floor(Math.random() * 7) - 3);
      if (w >= 0 && !opts.includes(w)) opts.push(w);
    }
    opts.sort(() => Math.random() - 0.5);
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button"); btn.className = "option-btn"; btn.innerText = opt;
      btn.onclick = () => handleAnswer(opt, n1, n2, op, btn);
      container.appendChild(btn);
    });
  }

  function handleAnswer(selected, n1, n2, op, btn) {
    if(!gameActive) return;
    const fb = document.getElementById("feedback-msg");
    const sp = document.getElementById("score-popup");
    fb.classList.remove("pop-feedback");
    if (selected === correctAnswer) {
      let timeUsed = (Date.now() - questionStartTime) / 1000;
      let earned = Math.max(1, 10 - Math.floor(timeUsed / 0.5)) * (++combo);
      score += earned; questCount++;
      fb.innerText = i18n[currentLang].pos[Math.floor(Math.random()*3)];
      fb.style.color = "#4CAF50";
      sp.innerText = `+${earned} (x${combo})`; sp.style.color = "#ff9800";
    } else {
      score = Math.max(0, score - 10); combo = 0;
      wrongQuestions.push({ q: `${n1} ${op==='add'?'+':'-'} ${n2}`, right: correctAnswer, yours: selected });
      fb.innerText = i18n[currentLang].neg[Math.floor(Math.random()*2)];
      fb.style.color = "#f44336";
      sp.innerText = "-10 ❗"; sp.style.color = "#f44336";
    }
    document.getElementById("score").innerText = score;
    document.getElementById("quest-count").innerText = questCount;
    void fb.offsetWidth; fb.classList.add("pop-feedback");
    setTimeout(generateQuestion, 200);
  }

  function endGame(name) {
    gameActive = false; showScreen("leaderboard-screen");
    const t = i18n[currentLang];
    const flagInput = document.getElementById("player-country").value;
    
    document.getElementById("final-stats").innerText = `${flagInput} ${name}\n${t.scoreLabel}: ${score} | ${t.questLabel}: ${questCount}`;
    document.getElementById("txt-result-title").innerText = t.resultTitle;

    const mList = document.getElementById("mistakes-list");
    mList.innerHTML = "";
    if(wrongQuestions.length > 0) {
        document.getElementById("mistakes-section").style.display = "block";
        wrongQuestions.forEach(m => {
            mList.innerHTML += `<li><span>${m.q} = <span class="correct-part">${m.right}</span></span> <span class="mistake-item">(你選了 ${m.yours})</span></li>`;
        });
    } else { document.getElementById("mistakes-section").style.display = "none"; }

    if(gameMode === 'mix') {
        let lb = JSON.parse(localStorage.getItem("mathPooLB_V4")) || [];
        lb.push({ name, flag: flagInput, score, region: flagInput, date: new Date().toLocaleDateString() });
        localStorage.setItem("mathPooLB_V4", JSON.stringify(lb));
        switchTab('world');
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }
  }

  function renderLeaderboard() {
      const list = document.getElementById("leaderboard-list");
      list.innerHTML = "";
      let lb = JSON.parse(localStorage.getItem("mathPooLB_V4")) || [];
      let currentFlag = document.getElementById("player-country").value;
      let currentName = document.getElementById("player-name").value;
      let filtered = lb;
      if (currentActiveTab === 'personal') filtered = lb.filter(e => e.name === currentName);
      else if (currentActiveTab === 'regional') filtered = lb.filter(e => e.region === currentFlag);
      filtered.sort((a,b) => b.score - a.score).slice(0,20).forEach((e, i) => {
          list.innerHTML += `<li><span>${i+1}. ${e.flag} ${e.name}</span><b>${e.score}</b></li>`;
      });
  }

  function switchTab(tab) {
      currentActiveTab = tab;
      document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      renderLeaderboard();
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function openLeaderboardOnly() { showScreen("leaderboard-screen"); switchTab('world'); }
  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🎵"; }
</script>
</body>
</html>
