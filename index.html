<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>20以內數學挑戰 - 直式 Poo Poo 版</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  body { 
    font-family: 'Courier New', Courier, monospace; /* 使用等寬字體方便對齊 */
    text-align: center; background-color: #fff9c4; 
    margin: 0; padding: 20px; touch-action: manipulation; overflow-x: hidden;
  }
  #app { 
    max-width: 400px; margin: 0 auto; background: white; 
    padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
  }
  .screen { display: none; }
  .active { display: block; }
  
  #feedback { 
    height: 30px; font-size: 1.5rem; font-weight: bold; margin: 10px 0;
    transition: all 0.2s; opacity: 0; font-family: sans-serif;
  }
  .show-feedback { opacity: 1 !important; transform: scale(1.1); }

  .stats { display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: bold; font-family: sans-serif; }
  
  /* --- 直式運算核心樣式 --- */
  .math-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
  }
  .vertical-math {
    font-size: 4.5rem;
    font-weight: bold;
    text-align: right;
    line-height: 1.1;
    display: inline-block;
    padding: 10px;
  }
  .bottom-line {
    border-bottom: 6px solid #333;
    display: block;
    margin-bottom: 10px;
  }
  .operator {
    float: left;
    margin-right: 20px;
  }
  /* ----------------------- */

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .option-btn { 
    font-size: 2.5rem; padding: 20px; background-color: #fff; 
    border: 3px solid #e0e0e0; border-radius: 15px; cursor: pointer;
    box-shadow: 0 5px 0 #eee; transition: 0.1s;
  }
  .option-btn:active { transform: translateY(3px); box-shadow: none; }

  .btn-primary { 
    font-size: 1.2rem; padding: 15px; background-color: #4CAF50; 
    color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; font-family: sans-serif;
  }
  #leaderboard-list { list-style: none; padding: 0; text-align: left; font-family: sans-serif; }
  #leaderboard-list li { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px dotted #ccc; align-items: center;}
  .record-tag { font-size: 0.8rem; background-color: #ff9800; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px;}

  /* 結局 Poo Poo 動畫 */
  #end-poo {
    display: none;
    font-size: 6rem;
    margin: 10px auto;
  }
  @keyframes poo-pop {
    0% { transform: scale(0) bounce; opacity: 0; }
    60% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .show-end-poo {
    display: block !important;
    animation: poo-pop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
</style>
</head>
<body>

<div id="app">
  <div id="start-screen" class="screen active">
    <h1 style="font-family:sans-serif;">💩 數學直式大挑戰</h1>
    <p style="font-family:sans-serif;">(1分鐘限時) <br> 破紀錄送你大 Poo Poo！</p>
    <input type="text" id="player-name" placeholder="輸入名字" maxlength="10" style="font-size:1.5rem; padding:10px; width:80%; margin-bottom:10px; border-radius:8px; border:2px solid #ddd;">
    <button class="btn-primary" onclick="startGame()">開始 60秒 挑戰</button>
    <button class="btn-primary" style="background-color: #9c27b0;" onclick="showLeaderboardOnly()">龍虎榜</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div style="color:#d32f2f">⏱ <span id="time">60</span>s</div>
      <div style="color:#1976d2">⭐ <span id="score">0</span></div>
    </div>
    <div id="feedback"></div>
    
    <div class="math-container">
      <div class="vertical-math">
        <div id="num1">15</div>
        <div class="bottom-line">
          <span id="op-sign" class="operator">+</span>
          <span id="num2"> 3</span>
        </div>
      </div>
    </div>

    <div class="options-grid" id="options-container"></div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <div id="end-poo">💩✨</div>
    <h1 id="end-title" style="font-family:sans-serif;">🏆 龍虎榜</h1>
    <p id="end-msg" style="font-size:1.2rem; font-weight:bold; font-family:sans-serif;"></p>
    <ul id="leaderboard-list"></ul>
    <button class="btn-primary" onclick="location.reload()">再玩一次</button>
  </div>
</div>

<script>
  let score = 0, timeLeft = 60, timerInterval, correctAnswer;
  let leaderboard = JSON.parse(localStorage.getItem("mathGameLeaderboard")) || [];
  
  const posWords = ["Wonderful!", "Superb!", "Well Done!", "Awesome!", "Perfect!"];
  const negWords = ["Keep Trying!", "Don't Give Up!", "Almost!", "Try Again!", "Focus!"];

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startGame() {
    let name = document.getElementById("player-name").value.trim();
    if (!name) return alert("話我知你叫咩名先！");
    score = 0; timeLeft = 60;
    updateStats();
    showScreen("game-screen");
    generateQuestion();
    
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("time").innerText = timeLeft;
      if (timeLeft <= 0) endGame(name);
    }, 1000);
  }

  function generateQuestion() {
    let isAdd = Math.random() > 0.5;
    let n1 = Math.floor(Math.random() * 21);
    let n2 = Math.floor(Math.random() * 21);
    
    if (isAdd) {
      correctAnswer = n1 + n2;
      document.getElementById("op-sign").innerText = "+";
    } else {
      if (n1 < n2) [n1, n2] = [n2, n1];
      correctAnswer = n1 - n2;
      document.getElementById("op-sign").innerText = "-";
    }

    // 更新直式數字，使用空格補齊兩位數對齊
    document.getElementById("num1").innerText = n1.toString().padStart(2, ' ');
    document.getElementById("num2").innerText = n2.toString().padStart(2, ' ');
    
    displayOptions();
  }

  function displayOptions() {
    let opts = [correctAnswer];
    while (opts.length < 4) {
      let offset = Math.floor(Math.random() * 9) - 4;
      let wrong = correctAnswer + offset;
      if (wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
    }
    opts.sort(() => Math.random() - 0.5);

    const container = document.getElementById("options-container");
    container.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt;
      btn.onclick = () => checkAnswer(opt, btn);
      container.appendChild(btn);
    });
  }

  function checkAnswer(selected, btn) {
    const feedbackEl = document.getElementById("feedback");
    feedbackEl.classList.remove("show-feedback");
    
    if (selected === correctAnswer) {
      score++;
      feedbackEl.innerText = posWords[Math.floor(Math.random() * posWords.length)];
      feedbackEl.style.color = "#4CAF50";
      btn.style.backgroundColor = "#c8e6c9";
    } else {
      score = Math.max(0, score - 1);
      feedbackEl.innerText = negWords[Math.floor(Math.random() * negWords.length)];
      feedbackEl.style.color = "#f44336";
      btn.style.backgroundColor = "#ffcdd2";
    }
    
    updateStats();
    void feedbackEl.offsetWidth; 
    feedbackEl.classList.add("show-feedback");
    setTimeout(generateQuestion, 200); 
  }

  function updateStats() {
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = timeLeft;
  }

  function endGame(name) {
    clearInterval(timerInterval);
    
    let personalBest = 0;
    leaderboard.forEach(entry => {
      if (entry.name === name && entry.score > personalBest) {
        personalBest = entry.score;
      }
    });

    let isNewPersonalRecord = score > personalBest;
    let endTitle = document.getElementById("end-title");
    let endMsg = document.getElementById("end-msg");
    let endPoo = document.getElementById("end-poo");

    endPoo.classList.remove("show-end-poo");

    if (isNewPersonalRecord && score > 0) {
      launchFireworks();
      endPoo.classList.add("show-end-poo");
      endTitle.innerText = "🎊 新紀錄達成！ 🎊";
      endMsg.innerText = `獎勵你一個大 Poo Poo！💩✨`;
      endMsg.style.color = "#fbc02d";
    } else {
      endTitle.innerText = "🏆 龍虎榜";
      endMsg.innerText = `${name}，繼續努力！`;
      endMsg.style.color = "#333";
    }

    leaderboard.push({ name, score, isNewRecord: isNewPersonalRecord });
    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 10);
    localStorage.setItem("mathGameLeaderboard", JSON.stringify(leaderboard));
    
    showLeaderboardOnly(name, score);
  }

  function launchFireworks() {
    var duration = 4 * 1000;
    var end = Date.now() + duration;
    (function frame() {
      confetti({ particleCount: 5, angle: 60, spread: 70, origin: { x: 0 }, colors: ['#ffeb3b', '#ff9800', '#795548'] });
      confetti({ particleCount: 5, angle: 120, spread: 70, origin: { x: 1 }, colors: ['#ffeb3b', '#f44336', '#8bc34a'] });
      if (Date.now() < end) requestAnimationFrame(frame);
    }());
  }

  function showLeaderboardOnly(currentPlayerName, currentScore) {
    showScreen("leaderboard-screen");
    const list = document.getElementById("leaderboard-list");
    list.innerHTML = "";
    leaderboard.forEach((entry, index) => {
      const li = document.createElement("li");
      const nameSpan = document.createElement("span");
      let medal = (index === 0) ? '👑 ' : (index + 1) + '. ';
      nameSpan.innerHTML = `${medal}${entry.name}`;
      if (entry.isNewRecord && entry.name === currentPlayerName && entry.score === currentScore) {
         nameSpan.innerHTML += '<span class="record-tag">個人 PB</span>';
      }
      const scoreSpan = document.createElement("span");
      scoreSpan.style.fontWeight = "bold";
      scoreSpan.style.color = "#1976d2";
      scoreSpan.innerText = `${entry.score} pts`;
      li.appendChild(nameSpan);
      li.appendChild(scoreSpan);
      list.appendChild(li);
    });
  }
</script>
</body>
</html>
