<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加減混合大激鬥 - 💩 Math Master 3.9</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; text-align: center; background-color: #fff9c4; margin: 0; padding: 20px; touch-action: manipulation; }
  #app { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 600px; position: relative; overflow: hidden;}
  .screen { display: none; }
  .active { display: block; }
  
  .controls-footer { position: absolute; bottom: 15px; right: 15px; display: flex; gap: 10px; z-index: 100; }
  .control-btn { font-size: 1.1rem; background: #f8f8f8; border: 2px solid #ddd; border-radius: 12px; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

  .main-tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #fff59d; padding: 8px; border-radius: 12px; }
  .main-tab { flex: 1; padding: 10px 2px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: 900; font-size: 0.95rem; color: #795548; transition: 0.2s;}
  .main-tab.active { background: #ff9800; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  .main-view { display: none; animation: fadeIn 0.3s; }
  .main-view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .stats { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: bold; align-items: center; margin-top: 10px;}
  #time-container { color:#d32f2f; }
  .time-warning { transform: scale(1.3); color: #ff0000 !important; font-weight: 900; }

  #feedback-msg { height: 30px; font-weight: bold; margin: 5px 0; font-size: 1.1rem; transition: 0.2s; transform: scale(0); }
  .pop-feedback { transform: scale(1.2) !important; }
  #score-popup { font-size: 0.9rem; font-weight: bold; }

  .math-container { display: flex; justify-content: center; margin: 5px 0 15px; }
  .vertical-math { font-size: 4.5rem; font-weight: bold; text-align: right; line-height: 1.1; font-family: 'Courier New', monospace; }
  .bottom-line { border-bottom: 6px solid #333; display: block; margin-bottom: 10px; }
  .operator { float: left; margin-right: 20px; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-btn { font-size: 2.2rem; padding: 15px; background-color: #fff; border: 3px solid #e0e0e0; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #eee; font-weight: bold; }
  .option-btn:active { transform: translateY(3px); box-shadow: none; }

  .btn-mode { font-size: 1rem; padding: 12px; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px;}
  .bg-practice { background-color: #4CAF50; }
  .bg-challenge { background-color: #9c27b0; font-size: 1.1rem; padding: 15px; }
  
  .input-row { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
  #player-country { font-size: 1.1rem; padding: 5px; border-radius: 8px; border: 2px solid #ddd; width: 40%; }
  #player-name { font-size: 1.2rem; padding: 10px; border-radius: 8px; border: 2px solid #ddd; width: 55%; }

  .lb-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
  .lb-tab { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #eee; cursor: pointer; font-weight: bold; }
  .lb-tab.active { background: #ff9800; color: white; }

  .lb-list { list-style: none; padding: 0; text-align: left; max-height: 250px; overflow-y: auto; font-size: 0.95rem; margin-top: 10px; border: 1px solid #eee; border-radius: 8px;}
  .lb-list li, #mistakes-list li, #global-mistakes-list li { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center;}
  .mistake-item { color: #d32f2f; }
  .correct-part { color: #388e3c; font-weight: bold; }

  @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; box-sizing: border-box; }
      .no-print { display: none !important; }
      .print-only-title { display: block !important; margin-bottom: 20px; }
      #app { box-shadow: none; background: transparent; padding: 0; max-height: none; }
      body { background: white; padding: 0; }
      #global-mistakes-list li { border-bottom: 1px dashed #ccc; padding: 15px 0; font-size: 1.8rem; margin-bottom: 10px; }
      .q-text { font-family: 'Courier New', monospace; font-weight: bold; }
      .print-blank { display: inline !important; }
  }
</style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop></audio>
<audio id="audio-tick" src="tick.mp3"></audio>
<audio id="audio-win" src="win.mp3"></audio>

<div id="app">
  <div class="controls-footer no-print">
    <button id="lang-btn" class="control-btn" onclick="toggleLang()">中</button>
    <button id="mute-btn" class="control-btn" onclick="toggleMute()">🎵</button>
  </div>

  <div id="start-screen" class="screen active">
    <h1 id="txt-title" style="margin-bottom:10px;">加減混合大激鬥 💩</h1>
    <p id="txt-subtitle" style="font-weight:bold; color:#795548; line-height:1.4;">30秒鬥快鬥準，爆出最多最多嘅可愛poo poo</p>
    
    <div class="input-row">
      <select id="player-country">
        <option value="🇭🇰" selected>🇭🇰 香港 HK</option>
        <option value="🇲🇴">🇲🇴 澳門 MO</option>
        <option value="🇹🇼">🇹🇼 台灣 TW</option>
        <option value="🇺🇸">🇺🇸 美國 US</option>
        <option value="🇬🇧">🇬🇧 英國 UK</option>
        <option value="🇯🇵">🇯🇵 日本 JP</option>
      </select>
      <input type="text" id="player-name" placeholder="Name / 名字" maxlength="10">
    </div>

    <div class="main-tabs">
        <button class="main-tab active" onclick="switchMainTab('challenge')" id="tab-main-challenge">挑戰區</button>
        <button class="main-tab" onclick="switchMainTab('practice')" id="tab-main-practice">練習區</button>
        <button class="main-tab" onclick="switchMainTab('leaderboard')" id="tab-main-leaderboard">龍虎榜</button>
        <button class="main-tab" onclick="switchMainTab('mistakes')" id="tab-main-mistakes">錯題再練</button>
    </div>
    
    <div id="view-challenge" class="main-view active">
        <button class="btn-mode bg-challenge" onclick="prepareGame('mix')" id="txt-btn-mix">混合加減大挑戰 🔀</button>
    </div>

    <div id="view-practice" class="main-view">
        <div class="options-grid">
            <button class="btn-mode bg-practice" onclick="prepareGame('add10')" id="txt-btn-add10">10或以內加法 ➕</button>
            <button class="btn-mode bg-practice" onclick="prepareGame('sub10')" id="txt-btn-sub10">10或以內減法 ➖</button>
            <button class="btn-mode bg-practice" onclick="prepareGame('add20')" id="txt-btn-add20">20或以內加法 ➕</button>
            <button class="btn-mode bg-practice" onclick="prepareGame('sub20')" id="txt-btn-sub20">20或以內減法 ➖</button>
        </div>
    </div>
    
    <div id="view-leaderboard" class="main-view">
        <div class="lb-tabs">
            <button class="lb-tab lb-tab-home active" id="tab-home-world" onclick="switchTab('world')">World</button>
            <button class="lb-tab lb-tab-home" id="tab-home-regional" onclick="switchTab('regional')">Region</button>
            <button class="lb-tab lb-tab-home" id="tab-home-personal" onclick="switchTab('personal')">Personal</button>
        </div>
        <ul id="leaderboard-list-home" class="lb-list"></ul>
    </div>

    <div id="view-mistakes" class="main-view">
        <button onclick="startMistakePractice()" class="btn-mode" style="background:#ff9800; font-size:1.1rem; padding:15px;" id="txt-btn-redo">🚀 開始再做一次</button>
        <div style="display:flex; gap:10px; margin-bottom:15px;" class="no-print">
            <button onclick="clearGlobalMistakes()" class="btn-mode" style="background:#f44336; margin:0; flex:1;" id="txt-btn-clear">🗑️ 一鍵廢除</button>
            <button onclick="printGlobalMistakes()" class="btn-mode" style="background:#2196f3; margin:0; flex:1;" id="txt-btn-print">🖨️ 全頁印製</button>
        </div>
        <div id="print-area">
            <h2 class="print-only-title" style="display:none; text-align:center;">📝 錯題練習 Worksheet</h2>
            <p id="txt-mistakes-empty" style="color:#888; font-weight:bold;"></p>
            <ul id="global-mistakes-list" style="list-style:none; padding:0; text-align:left;"></ul>
        </div>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div><span class="l-quest">題數</span>: <span id="quest-count">0</span></div>
      <div id="time-container">⏱ <span id="time">30</span>s</div>
      <div style="color:#795548">💩 <span id="score">0</span></div>
    </div>
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <div id="feedback-msg">Ready?</div>
        <div id="score-popup"></div>
    </div>
    <div class="math-container">
      <div class="vertical-math">
        <div id="num1">--</div>
        <div class="bottom-line"><span id="op-sign" class="operator">+</span><span id="num2">--</span></div>
      </div>
    </div>
    <div class="options-grid" id="options-container"></div>
  </div>

  <div id="result-screen" class="screen">
    <div id="result-header">
        <div style="font-size: 4rem;">💩</div>
        <h2 id="txt-result-title">加減混合大激鬥</h2>
    </div>
    <p id="final-stats" style="font-weight:bold; background:#f0f0f0; padding:10px; border-radius:10px; margin:10px 0;"></p>
    <div id="mistakes-section" style="display:none; text-align:left;">
        <b id="txt-wrong-title">⚠️ 錯題檢討：</b>
        <ul id="mistakes-list" style="list-style:none; padding:0;"></ul>
    </div>
    <div id="record-section" style="margin-top:15px;">
        <div class="lb-tabs">
            <button class="lb-tab lb-tab-result active" id="tab-result-world" onclick="switchTab('world')">World</button>
            <button class="lb-tab lb-tab-result" id="tab-result-regional" onclick="switchTab('regional')">Region</button>
            <button class="lb-tab lb-tab-result" id="tab-result-personal" onclick="switchTab('personal')">Personal</button>
        </div>
        <ul id="leaderboard-list-result" class="lb-list"></ul>
    </div>
    <button class="btn-mode" style="background:#444; margin-top:10px; padding:15px;" onclick="returnToHome()" id="txt-btn-home">返回主頁</button>
  </div>
</div>

<script>
  let score = 0, timeLeft = 30, timerInterval, correctAnswer, gameMode = 'mix';
  let combo = 0, questCount = 0, gameActive = false, isMuted = false, currentLang = 'zh'; 
  let questionStartTime = 0, wrongQuestions = [], currentMistakeList = [];
  let currentActiveTab = 'world', isMistakeMode = false;

  window.onload = () => {
    const savedName = localStorage.getItem("mathPoo_Name");
    if (savedName) document.getElementById("player-name").value = savedName;
    updateStaticText();
    renderLeaderboard();
  };

  const i18n = {
    en: {
        title: "Mixed Math Battle! 💩", subtitle: "30s speed & accuracy challenge to pop cute poos!",
        tabPractice: "Practice", tabChallenge: "Challenge", tabLb: "Leaderboard", tabMistakes: "Mistakes",
        add10: "Add (within 10) ➕", sub10: "Sub (within 10) ➖",
        add20: "Add (within 20) ➕", sub20: "Sub (within 20) ➖", 
        mix: "Mixed Battle 🔀", redo: "🚀 Start Re-do",
        clearMistakes: "🗑️ Clear All", printMistakes: "🖨️ Print Page",
        quest: "Quest", resultTitle: "Game Over!", home: "Back to Home",
        scoreLabel: "Total Score", questLabel: "Correct", wrongTitle: "⚠️ Review Mistakes:",
        pos: ["Fast!", "Perfect!", "Well Done!"], neg: ["Try again!", "Almost!"]
    },
    zh: {
        title: "加減混合大激鬥 💩", subtitle: "30秒鬥快鬥準，爆出最多最多嘅可愛poo poo",
        tabPractice: "練習區", tabChallenge: "挑戰區", tabLb: "龍虎榜", tabMistakes: "錯題再練",
        add10: "10或以內加法 ➕", sub10: "10或以內減法 ➖",
        add20: "20或以內加法 ➕", sub20: "20或以內減法 ➖", 
        mix: "混合加減大激鬥 🔀", redo: "🚀 開始再做一次",
        clearMistakes: "🗑️ 一鍵廢除", printMistakes: "🖨️ 全頁印製",
        quest: "題數", resultTitle: "加減混合大激鬥", home: "返回主頁",
        scoreLabel: "總得分", questLabel: "答對題數", wrongTitle: "⚠️ 錯題檢討：",
        pos: ["神速！", "完美！", "做得好！"], neg: ["加油！", "再試一次！"]
    }
  };

  function toggleLang() {
    currentLang = currentLang === 'en' ? 'zh' : 'en';
    document.getElementById("lang-btn").innerText = currentLang === 'en' ? '中' : 'EN';
    updateStaticText();
  }

  function updateStaticText() {
    const t = i18n[currentLang];
    document.getElementById("txt-title").innerText = t.title;
    document.getElementById("txt-subtitle").innerText = t.subtitle;
    document.querySelectorAll(".l-quest").forEach(el => el.innerText = t.quest);
    document.getElementById("tab-main-practice").innerText = t.tabPractice;
    document.getElementById("tab-main-challenge").innerText = t.tabChallenge;
    document.getElementById("tab-main-leaderboard").innerText = t.tabLb;
    document.getElementById("tab-main-mistakes").innerText = t.tabMistakes;
    document.getElementById("txt-btn-redo").innerText = t.redo;
    document.getElementById("txt-btn-clear").innerText = t.clearMistakes;
    document.getElementById("txt-btn-print").innerText = t.printMistakes;
    document.getElementById("txt-btn-add10").innerText = t.add10;
    document.getElementById("txt-btn-sub10").innerText = t.sub10;
    document.getElementById("txt-btn-add20").innerText = t.add20;
    document.getElementById("txt-btn-sub20").innerText = t.sub20;
    document.getElementById("txt-btn-mix").innerText = t.mix;
    document.getElementById("txt-btn-home").innerText = t.home;
    document.getElementById("txt-wrong-title").innerText = t.wrongTitle;
    renderGlobalMistakes();
  }

  function switchMainTab(tab) {
    document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-main-${tab}`).classList.add('active');
    document.querySelectorAll('.main-view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${tab}`).classList.add('active');
    if(tab === 'leaderboard') renderLeaderboard();
    if(tab === 'mistakes') renderGlobalMistakes();
  }

  function renderGlobalMistakes() {
      let globalM = JSON.parse(localStorage.getItem("mathPoo_GlobalMistakes")) || [];
      const container = document.getElementById("global-mistakes-list");
      const emptyTxt = document.getElementById("txt-mistakes-empty");
      const redoBtn = document.getElementById("txt-btn-redo");
      container.innerHTML = "";
      if (globalM.length === 0) {
          emptyTxt.innerText = i18n[currentLang].mistakesEmpty || "暫無錯題";
          emptyTxt.style.display = "block";
          redoBtn.style.display = "none";
      } else {
          emptyTxt.style.display = "none";
          redoBtn.style.display = "block";
          globalM.forEach(m => {
              container.innerHTML += `<li><span class="q-text" style="font-size:1.2rem;">${m.q} = ?</span><span class="print-blank" style="display:none; border-bottom:1px solid #000; width:50px;">____</span></li>`;
          });
      }
  }

  function startMistakePractice() {
      currentMistakeList = JSON.parse(localStorage.getItem("mathPoo_GlobalMistakes")) || [];
      if(currentMistakeList.length === 0) return;
      isMistakeMode = true;
      prepareGame('mistake-redo');
  }

  function prepareGame(mode) {
    gameMode = mode;
    let name = document.getElementById("player-name").value.trim() || "Player";
    localStorage.setItem("mathPoo_Name", name);
    startGame(name);
  }

  function startGame(name) {
    score = 0; combo = 0; questCount = 0; timeLeft = 30; wrongQuestions = []; gameActive = true;
    document.getElementById("score").innerText = "0";
    document.getElementById("time-container").classList.remove("time-warning");
    showScreen("game-screen");
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("time").innerText = timeLeft;
      if (timeLeft <= 5) document.getElementById("time-container").classList.add("time-warning");
      if (timeLeft <= 0) { clearInterval(timerInterval); endGame(name); }
    }, 1000);
    generateQuestion();
  }

  function generateQuestion() {
    let n1, n2, opSign;
    if (isMistakeMode) {
        if(currentMistakeList.length === 0) { clearInterval(timerInterval); endGame(localStorage.getItem("mathPoo_Name")); return; }
        let idx = Math.floor(Math.random() * currentMistakeList.length);
        let m = currentMistakeList.splice(idx, 1)[0];
        // 題目解析
        let parts = m.q.split(' ');
        n1 = parseInt(parts[0]); opSign = parts[1]; n2 = parseInt(parts[2]);
        correctAnswer = m.right;
    } else {
        let limit = (gameMode.includes('10')) ? 10 : 20;
        let op = gameMode.startsWith('sub') ? 'sub' : (gameMode === 'mix' ? (Math.random() > 0.5 ? 'add' : 'sub') : 'add');
        if (op === 'add') {
            n1 = Math.floor(Math.random() * (limit + 1)); n2 = Math.floor(Math.random() * (limit + 1));
            correctAnswer = n1 + n2; opSign = "+";
        } else {
            n1 = Math.floor(Math.random() * (limit + 1)); n2 = Math.floor(Math.random() * (n1 + 1));
            correctAnswer = n1 - n2; opSign = "-";
        }
    }
    document.getElementById("num1").innerText = n1;
    document.getElementById("num2").innerText = n2;
    document.getElementById("op-sign").innerText = opSign;
    questionStartTime = Date.now();
    
    let opts = [correctAnswer];
    while (opts.length < 4) {
      let w = correctAnswer + (Math.floor(Math.random() * 7) - 3);
      if (w >= 0 && !opts.includes(w)) opts.push(w);
    }
    opts.sort(() => Math.random() - 0.5);
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button"); btn.className = "option-btn"; btn.innerText = opt;
      btn.onclick = () => handleAnswer(opt, n1, n2, opSign, btn);
      container.appendChild(btn);
    });
  }

  function handleAnswer(selected, n1, n2, opSign, btn) {
    if(!gameActive) return;
    const fb = document.getElementById("feedback-msg");
    const sp = document.getElementById("score-popup");
    fb.classList.remove("pop-feedback");
    
    if (selected === correctAnswer) {
      let earned = Math.max(1, 10 - Math.floor((Date.now() - questionStartTime) / 500)) * (++combo);
      score += earned; questCount++;
      fb.innerText = i18n[currentLang].pos[Math.floor(Math.random()*3)];
      fb.style.color = "#4CAF50";
      sp.innerText = `+${earned}`; sp.style.color = "#ff9800";
    } else {
      score = Math.max(0, score - 10); combo = 0;
      let qStr = `${n1} ${opSign} ${n2}`;
      wrongQuestions.push({ q: qStr, right: correctAnswer, yours: selected });
      if(!isMistakeMode) {
          let globalM = JSON.parse(localStorage.getItem("mathPoo_GlobalMistakes")) || [];
          if (!globalM.some(m => m.q === qStr)) {
              globalM.push({ q: qStr, right: correctAnswer, yours: selected });
              localStorage.setItem("mathPoo_GlobalMistakes", JSON.stringify(globalM));
          }
      }
      fb.innerText = i18n[currentLang].neg[Math.floor(Math.random()*2)];
      fb.style.color = "#f44336";
      sp.innerText = "-10 ❗"; sp.style.color = "#f44336";
    }
    document.getElementById("score").innerText = score;
    document.getElementById("quest-count").innerText = questCount;
    void fb.offsetWidth; fb.classList.add("pop-feedback");
    setTimeout(generateQuestion, 200);
  }

  function endGame(name) {
    gameActive = false; isMistakeMode = false;
    showScreen("result-screen");
    const t = i18n[currentLang];
    const flag = document.getElementById("player-country").value;
    document.getElementById("final-stats").innerText = `${flag} ${name}\n${t.scoreLabel}: ${score} | ${t.questLabel}: ${questCount}`;

    const mList = document.getElementById("mistakes-list");
    mList.innerHTML = "";
    if(wrongQuestions.length > 0) {
        document.getElementById("mistakes-section").style.display = "block";
        wrongQuestions.forEach(m => {
            mList.innerHTML += `<li><span>${m.q} = <span class="correct-part">${m.right}</span></span> <span class="mistake-item">(你選了 ${m.yours})</span></li>`;
        });
    } else { document.getElementById("mistakes-section").style.display = "none"; }

    if(gameMode === 'mix') {
        let lb = JSON.parse(localStorage.getItem("mathPooLB_V4")) || [];
        lb.push({ name, flag, score, region: flag, date: new Date().toLocaleDateString() });
        localStorage.setItem("mathPooLB_V4", JSON.stringify(lb));
        switchTab('world');
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }
  }

  function renderLeaderboard() {
      let lb = JSON.parse(localStorage.getItem("mathPooLB_V4")) || [];
      let flag = document.getElementById("player-country").value;
      let name = document.getElementById("player-name").value;
      let filtered = (currentActiveTab === 'personal') ? lb.filter(e => e.name === name) : (currentActiveTab === 'regional' ? lb.filter(e => e.region === flag) : lb);
      let html = "";
      filtered.sort((a,b) => b.score - a.score).slice(0,20).forEach((e, i) => {
          html += `<li><span>${i+1}. ${e.flag} ${e.name}</span><b>${e.score}</b></li>`;
      });
      document.getElementById("leaderboard-list-home").innerHTML = html;
      document.getElementById("leaderboard-list-result").innerHTML = html;
  }

  function switchTab(tab) {
      currentActiveTab = tab;
      document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll(`[id$='-${tab}']`).forEach(b => b.classList.add('active'));
      renderLeaderboard();
  }

  function clearGlobalMistakes() {
      if(confirm("確定廢除所有紀錄？")) { localStorage.removeItem("mathPoo_GlobalMistakes"); renderGlobalMistakes(); }
  }

  function printGlobalMistakes() { window.print(); }
  function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
  function returnToHome() { showScreen("start-screen"); renderGlobalMistakes(); }
  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🎵"; }
</script>
</body>
</html>
