<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💩 算術分項挑戰 - 音樂開關版</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  body { 
    font-family: 'Courier New', Courier, monospace; 
    text-align: center; background-color: #fff9c4; 
    margin: 0; padding: 20px; touch-action: manipulation; overflow-x: hidden;
  }
  #app { 
    max-width: 400px; margin: 0 auto; background: white; 
    padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    min-height: 550px; position: relative;
  }
  .screen { display: none; }
  .active { display: block; }
  
  /* 音樂開關按鈕 */
  #mute-btn {
    position: absolute; top: 15px; right: 15px;
    font-size: 1.5rem; background: #eee; border: none;
    border-radius: 50%; width: 45px; height: 45px; cursor: pointer; z-index: 100;
  }

  .stats { display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: bold; font-family: sans-serif; align-items: center; margin-top: 10px;}
  #time-container { color:#d32f2f; transition: transform 0.1s; display: inline-block; }
  .time-warning { transform: scale(1.5); font-weight: 900; }

  .math-container { display: flex; justify-content: center; margin: 15px 0; }
  .vertical-math { font-size: 4.5rem; font-weight: bold; text-align: right; line-height: 1.1; display: inline-block; padding: 10px; }
  .bottom-line { border-bottom: 6px solid #333; display: block; margin-bottom: 10px; }
  .operator { float: left; margin-right: 20px; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .option-btn { 
    font-size: 2.5rem; padding: 20px; background-color: #fff; 
    border: 3px solid #e0e0e0; border-radius: 15px; cursor: pointer;
    box-shadow: 0 5px 0 #eee; transition: 0.1s;
  }
  .option-btn:active { transform: translateY(3px); box-shadow: none; }

  .btn-mode { font-size: 1.2rem; padding: 15px; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 10px; font-family: sans-serif; font-weight: bold; }
  .bg-add { background-color: #4CAF50; }
  .bg-sub { background-color: #2196F3; }
  
  #leaderboard-list { list-style: none; padding: 0; text-align: left; font-family: sans-serif; max-height: 200px; overflow-y: auto; font-size: 0.9rem; }
  #leaderboard-list li { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px dotted #ccc; }
</style>
</head>
<body>

<audio id="audio-bgm" src="bgm.mp3" loop></audio>
<audio id="audio-tick" src="tick.mp3"></audio>
<audio id="audio-win" src="win.mp3"></audio>

<div id="app">
  <button id="mute-btn" onclick="toggleMute()">🎵</button>

  <div id="start-screen" class="screen active">
    <h1 style="font-family:sans-serif; margin-bottom:5px;">💩 算術大爆發</h1>
    <p style="font-family:sans-serif; color:#795548;">破紀錄即噴 1000+ 粒 💩</p>
    
    <input type="text" id="player-name" placeholder="輸入大名" maxlength="10" style="font-size:1.3rem; padding:10px; width:80%; margin-bottom:15px; border-radius:8px; border:2px solid #ddd;">
    
    <button class="btn-mode bg-add" onclick="prepareGame('add')">加法練習 ➕</button>
    <button class="btn-mode bg-sub" onclick="prepareGame('sub')">減法練習 ➖</button>
    
    <div style="margin-top:20px; font-size:0.8rem; color:#999;">
        *請確保目錄下有 bgm.mp3, tick.mp3, win.mp3
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div id="time-container">⏱ <span id="time">30</span>s</div>
      <div style="color:#1976d2">⭐ <span id="score">0</span></div>
    </div>
    <div id="combo-display" style="color:#ff5722; font-weight:bold; margin-top:5px;">Combo: 0</div>
    
    <div class="math-container">
      <div class="vertical-math">
        <div id="num1">--</div>
        <div class="bottom-line"><span id="op-sign" class="operator">+</span><span id="num2">--</span></div>
      </div>
    </div>
    <div class="options-grid" id="options-container"></div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <h1 id="result-title" style="margin:10px 0;">🎉 完結！</h1>
    <p id="final-msg" style="font-weight:bold; color:#795548;"></p>
    <ul id="leaderboard-list"></ul>
    <button class="btn-mode bg-add" style="background:#444;" onclick="location.reload()">返回主頁</button>
  </div>
</div>

<script>
  let score = 0, timeLeft = 30, timerInterval, correctAnswer, gameMode = 'add';
  let combo = 0, questionStartTime = 0, isMuted = false;
  let leaderboard = JSON.parse(localStorage.getItem("mathPooLeaderboard")) || [];

  const audioBgm = document.getElementById("audio-bgm");
  const audioTick = document.getElementById("audio-tick");
  const audioWin = document.getElementById("audio-win");

  function toggleMute() {
    isMuted = !isMuted;
    document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🎵";
    audioBgm.muted = isMuted;
    audioTick.muted = isMuted;
    audioWin.muted = isMuted;
  }

  function prepareGame(mode) {
    gameMode = mode;
    let name = document.getElementById("player-name").value.trim();
    if (!name) return alert("請輸入名字先！");
    
    // 預熱音效
    audioBgm.play().then(() => { if(gameActive===false) audioBgm.pause(); }).catch(e=>e);
    startGame(name);
  }

  let gameActive = false;
  function startGame(name) {
    score = 0; timeLeft = 30; combo = 0; gameActive = true;
    document.getElementById("score").innerText = "0";
    document.getElementById("time").innerText = "30";
    document.getElementById("op-sign").innerText = (gameMode === 'add') ? "+" : "-";
    
    showScreen("game-screen");
    if(!isMuted) { audioBgm.currentTime = 0; audioBgm.play().catch(e=>e); }
    
    generateQuestion();
    
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("time").innerText = timeLeft;
      
      if (timeLeft <= 5 && timeLeft > 0 && !isMuted) {
        document.getElementById("time-container").classList.add("time-warning");
        setTimeout(()=>document.getElementById("time-container").classList.remove("time-warning"), 200);
        audioTick.currentTime = 0;
        audioTick.play().catch(e=>e);
      }

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        gameActive = false;
        endGame(name);
      }
    }, 1000);
  }

  function generateQuestion() {
    let a = Math.floor(Math.random() * 21), b = Math.floor(Math.random() * 21);
    let n1 = Math.max(a, b), n2 = Math.min(a, b);
    
    if (gameMode === 'add') { correctAnswer = n1 + n2; }
    else { correctAnswer = n1 - n2; }
    
    document.getElementById("num1").innerText = n1.toString().padStart(2, ' ');
    document.getElementById("num2").innerText = n2.toString().padStart(2, ' ');
    questionStartTime = Date.now();
    
    let opts = [correctAnswer];
    while (opts.length < 4) {
      let wrong = correctAnswer + (Math.floor(Math.random() * 11) - 5);
      if (wrong >= 0 && !opts.includes(wrong)) opts.push(wrong);
    }
    opts.sort(() => Math.random() - 0.5);
    
    const container = document.getElementById("options-container");
    container.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt;
      btn.onclick = () => {
        if(!gameActive) return;
        if (opt === correctAnswer) {
            let bonus = Math.max(1, 10 - Math.floor((Date.now()-questionStartTime)/500));
            combo++;
            score += (bonus * Math.min(combo, 99));
            btn.style.backgroundColor = "#c8e6c9";
        } else {
            combo = 0; score = Math.max(0, score - 10);
            btn.style.backgroundColor = "#ffcdd2";
        }
        document.getElementById("score").innerText = score;
        document.getElementById("combo-display").innerText = `Combo: ${combo}`;
        setTimeout(generateQuestion, 200);
      };
      container.appendChild(btn);
    });
  }

  function endGame(name) {
    audioBgm.pause();
    if(!isMuted) audioWin.play().catch(e=>e);
    
    showScreen("leaderboard-screen");
    document.getElementById("final-msg").innerText = `你喺${gameMode==='add'?'加法':'減法'}攞咗 ${score} 分！\n即刻爆 💩 慶祝！`;

    leaderboard.push({ name, score, mode: gameMode });
    leaderboard.sort((a, b) => b.score - a.score);
    localStorage.setItem("mathPooLeaderboard", JSON.stringify(leaderboard.slice(0, 10)));

    updateLeaderboard();
    
    // 放大版 💩 噴發
    const poo = confetti.shapeFromText({ text: '💩', scalar: 2.5 });
    let count = 0;
    const interval = setInterval(() => {
        confetti({
            particleCount: Math.ceil(score / 10),
            spread: 100,
            origin: { y: 0.6, x: Math.random() },
            shapes: [poo],
            scalar: 2.5
        });
        count++;
        if(count >= 10) clearInterval(interval);
    }, 300);
  }

  function updateLeaderboard() {
    const list = document.getElementById("leaderboard-list");
    list.innerHTML = "";
    leaderboard.slice(0, 10).forEach((e, i) => {
        list.innerHTML += `<li><span>${i+1}. ${e.name} (${e.mode==='add'?'加':'減'})</span><b>${e.score} pts</b></li>`;
    });
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>
</body>
</html>
