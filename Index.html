<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>20以內加減法挑戰</title>
<style>
  /* 整體介面風格 */
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    text-align: center; 
    background-color: #f0f8ff; 
    margin: 0; 
    padding: 20px; 
    touch-action: manipulation; 
  }
  #app { 
    max-width: 400px; 
    margin: 0 auto; 
    background: white; 
    padding: 20px; 
    border-radius: 15px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
  }
  h1 { color: #333; }
  .screen { display: none; }
  .active { display: block; }
  
  /* 輸入框與按鈕 */
  input[type="text"] { 
    font-size: 1.5rem; 
    padding: 10px; 
    width: 80%; 
    margin-bottom: 20px; 
    border: 2px solid #ccc; 
    border-radius: 8px; 
    text-align: center; 
  }
  .btn-primary { 
    font-size: 1.2rem; 
    padding: 12px 30px; 
    background-color: #4CAF50; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    cursor: pointer; 
    font-weight: bold;
    width: 80%;
  }
  .btn-primary:active { background-color: #45a049; }

  /* 遊戲介面 */
  .stats { 
    display: flex; 
    justify-content: space-between; 
    font-size: 1.5rem; 
    font-weight: bold; 
    margin-bottom: 10px; 
    color: #555; 
  }
  #time-display { color: #d32f2f; }
  #score-display { color: #1976d2; }
  #question { 
    font-size: 3.5rem; 
    font-weight: bold; 
    margin: 20px 0; 
    color: #222; 
  }
  #user-answer { 
    font-size: 3rem; 
    color: #0066cc; 
    height: 60px; 
    line-height: 60px;
    margin-bottom: 20px; 
    border-bottom: 4px dashed #ccc; 
    width: 50%; 
    margin-left: auto; 
    margin-right: auto; 
  }

  /* 大型數字鍵盤 */
  .keypad { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 12px; 
    margin-top: 10px; 
  }
  .keypad button { 
    font-size: 2rem; 
    padding: 20px 0; 
    background-color: #f9f9f9; 
    color: #333; 
    border: 2px solid #e0e0e0; 
    border-radius: 12px; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
    cursor: pointer;
  }
  .keypad button:active { 
    background-color: #e0e0e0; 
    transform: translateY(2px);
    box-shadow: 0 2px 3px rgba(0,0,0,0.05);
  }
  .keypad .btn-confirm { 
    background-color: #ff9800; 
    color: white; 
    border-color: #f57c00; 
    font-size: 2.5rem;
  }
  .keypad .btn-confirm:active { background-color: #e68a00; }
  .keypad .btn-clear { 
    background-color: #f44336; 
    color: white; 
    border-color: #d32f2f; 
  }

  /* 龍虎榜 */
  #leaderboard-list { 
    list-style: none; 
    padding: 0; 
    font-size: 1.3rem; 
    text-align: left; 
    margin: 20px 0; 
  }
  #leaderboard-list li { 
    display: flex; 
    justify-content: space-between; 
    padding: 12px 10px; 
    border-bottom: 1px solid #eee; 
  }
  #leaderboard-list li span:nth-child(1) { font-weight: bold; color: #333; }
  #leaderboard-list li span:nth-child(2) { color: #e91e63; font-weight: bold; }
</style>
</head>
<body>

<div id="app">
  
  <div id="start-screen" class="screen active">
    <h1>🚀 20以內加減法挑戰</h1>
    <p>30秒限時，鬥快答對最多！</p>
    <input type="text" id="player-name" placeholder="輸入你的大名" maxlength="10">
    <br>
    <button class="btn-primary" onclick="startGame()">開始遊戲</button>
    <br><br>
    <button class="btn-primary" style="background-color: #9c27b0;" onclick="showLeaderboardOnly()">查看龍虎榜</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div id="time-display">⏱ <span id="time">30</span>s</div>
      <div id="score-display">⭐ <span id="score">0</span></div>
    </div>
    <div id="question">5 + 5 =</div>
    <div id="user-answer"></div>
    
    <div class="keypad">
      <button onclick="pressKey(1)">1</button>
      <button onclick="pressKey(2)">2</button>
      <button onclick="pressKey(3)">3</button>
      <button onclick="pressKey(4)">4</button>
      <button onclick="pressKey(5)">5</button>
      <button onclick="pressKey(6)">6</button>
      <button onclick="pressKey(7)">7</button>
      <button onclick="pressKey(8)">8</button>
      <button onclick="pressKey(9)">9</button>
      <button class="btn-clear" onclick="clearInput()">C</button>
      <button onclick="pressKey(0)">0</button>
      <button class="btn-confirm" onclick="submitAnswer()">✔</button>
    </div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <h1>🏆 龍虎榜</h1>
    <ul id="leaderboard-list"></ul>
    <button class="btn-primary" onclick="showScreen('start-screen')">返回主選單</button>
  </div>

</div>

<script>
  let playerName = "";
  let score = 0;
  let timeLeft = 30;
  let timerInterval;
  let correctAnswer = 0;
  let currentInput = "";
  let leaderboard = JSON.parse(localStorage.getItem("mathGameLeaderboard")) || [];

  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  function startGame() {
    playerName = document.getElementById("player-name").value.trim();
    if (!playerName) {
      alert("喂喂，輸入咗名先可以挑戰㗎！");
      return;
    }
    
    score = 0;
    timeLeft = 30;
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = timeLeft;
    currentInput = "";
    updateInputDisplay();
    
    showScreen("game-screen");
    generateQuestion();
    
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("time").innerText = timeLeft;
      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);
  }

  // --- 更新咗嘅出題邏輯 ---
  function generateQuestion() {
    let isAddition = Math.random() > 0.5;
    let num1, num2;
    
    if (isAddition) {
      // 加法：被加數同加數各自都可以係 0-20
      num1 = Math.floor(Math.random() * 21); 
      num2 = Math.floor(Math.random() * 21); 
      correctAnswer = num1 + num2;
      document.getElementById("question").innerText = `${num1} + ${num2} =`;
    } else {
      // 減法：先抽出 0-20 嘅被減數，再確保減數細過或等於被減數
      num1 = Math.floor(Math.random() * 21); 
      num2 = Math.floor(Math.random() * (num1 + 1)); 
      correctAnswer = num1 - num2;
      document.getElementById("question").innerText = `${num1} - ${num2} =`;
    }
    
    currentInput = "";
    updateInputDisplay();
  }

  function pressKey(num) {
    if (currentInput.length < 2) {
      currentInput += num;
      updateInputDisplay();
    }
  }

  function clearInput() {
    currentInput = "";
    updateInputDisplay();
  }

  function updateInputDisplay() {
    document.getElementById("user-answer").innerText = currentInput;
  }

  function submitAnswer() {
    if (currentInput === "") return;
    
    if (parseInt(currentInput) === correctAnswer) {
      score++;
      document.getElementById("score").innerText = score;
      generateQuestion(); 
    } else {
      let answerBox = document.getElementById("user-answer");
      answerBox.style.color = "red";
      setTimeout(() => {
        answerBox.style.color = "#0066cc";
        clearInput();
      }, 200);
    }
  }

  function endGame() {
    clearInterval(timerInterval);
    alert(`時間到！\n${playerName}，你總共答對咗 ${score} 題！`);
    
    leaderboard.push({ name: playerName, score: score });
    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 10); 
    localStorage.setItem("mathGameLeaderboard", JSON.stringify(leaderboard));
    
    showLeaderboardOnly();
  }

  function showLeaderboardOnly() {
    showScreen("leaderboard-screen");
    let list = document.getElementById("leaderboard-list");
    list.innerHTML = "";
    
    if (leaderboard.length === 0) {
      list.innerHTML = "<li><span>暫時未有紀錄，快啲做第一人！</span></li>";
      return;
    }

    leaderboard.forEach((entry, index) => {
      let li = document.createElement("li");
      let medal = "";
      if(index === 0) medal = "🥇 ";
      else if(index === 1) medal = "🥈 ";
      else if(index === 2) medal = "🥉 ";
      
      li.innerHTML = `<span>${medal}${index + 1}. ${entry.name}</span> <span>${entry.score} 分</span>`;
      list.appendChild(li);
    });
  }
</script>

</body>
</html>
